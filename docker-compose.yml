version: "3.9"

services:
  moodex:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE}
      - TELEGRAM_STRING_SESSION=${TELEGRAM_STRING_SESSION}
      - NLP_MODEL=${NLP_MODEL:-cointegrated/rubert-tiny-sentiment-balanced}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_SECRET_KEY=${API_SECRET_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///./moodex.db
      - SENTIMENT_WINDOW_MINUTES=${SENTIMENT_WINDOW_MINUTES:-60}
      - MIN_MESSAGES_FOR_SIGNAL=${MIN_MESSAGES_FOR_SIGNAL:-5}
    volumes:
      - moodex_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  moodex_data:
